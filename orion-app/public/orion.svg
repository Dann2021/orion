<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 200"
     xmlns="http://www.w3.org/2000/svg"
     style="width:100%; height:auto; display:block;">

  <defs>
    <linearGradient id="orionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B8CFF"/>
      <stop offset="100%" stop-color="#8F5BFF"/>
    </linearGradient>

    <radialGradient id="starGlow">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#5B8CFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Orbite -->
  <ellipse cx="200" cy="100" rx="70" ry="30"
           fill="none"
           stroke="url(#orionGradient)"
           stroke-width="3"/>

  <!-- Planète centrale -->
  <circle cx="200" cy="100" r="18"
          fill="url(#orionGradient)" />

  <!-- Étoiles -->
  <circle cx="150" cy="70" r="4" fill="white"/>
  <circle cx="250" cy="60" r="3" fill="white"/>
  <circle cx="260" cy="120" r="4" fill="white"/>
  <circle cx="160" cy="130" r="3" fill="white"/>

  <!-- Glow -->
  <circle cx="200" cy="100" r="35"
          fill="url(#starGlow)" />

</svg>